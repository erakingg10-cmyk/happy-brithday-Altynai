<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Happy Brithday 💖</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
        }

        button {
            padding: 15px 30px;
            font-size: 35px;
            border: none;
            border-radius: 30px;
            background: #ff6f91;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            background: #ff3e6c;
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        .message {
            font-size: 28px;
            max-width: 500px;
            line-height: 1.5;
            animation: fadeIn 2s ease forwards;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: -1;
        }

        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }
        
    </style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="container">
    <button onclick="showMessage()">Бас 💌</button>

    <div id="message" class="hidden message">
        💖 Туылған күніңмен ЖАНЫМ 💖 <br><br>
        Саған өмірдегі бар жақсылықты тілеймін ешқашан 
        сырқамай ауырмай алдымда күліп шаттанып жүре бер 
        <br><br>сен мен үшін ең қымбат адамдарымның бірісің  ✨
    </div>



</div>

<script>
    function showMessage() {
        document.querySelector("button").style.display = "none";
        document.getElementById("message").classList.remove("hidden");
    }

    // генерация сердечек
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 10 + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.getElementById("hearts").appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
